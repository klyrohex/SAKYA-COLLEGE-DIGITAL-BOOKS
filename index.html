<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Library</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f5f5f5;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    table {
        width: 70%;
        margin: auto;
        border-collapse: collapse;
        background: white;
    }

    th, td {
        border: 1px solid #ccc;
        padding: 12px;
        text-align: left;
    }

    th {
        background-color: #333;
        color: white;
    }

    .caret {
        cursor: pointer;
        font-weight: bold;
    }

    .caret::before {
        content: "▶ ";
        color: black;
    }

    .caret-down::before {
        content: "▼ ";
    }

    .nested {
        display: none;
        margin-top: 10px;
        margin-left: 20px;
    }

    .active {
        display: block;
    }

    a {
        text-decoration: none;
        color: blue;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</head>

<body>

<h1>📚 Digital Library</h1>

<table>
<tr>
    <th>Books</th>
</tr>

<tr>
<td>
    <span class="caret">Frank</span>
    <div class="nested">
        <ul>
            <li><a href="books/frankenstein.txt" target="_blank">Frankenstein - Full Book</a></li>        
        </ul>
    </div>
</td>
</tr>

<tr>
<td>
    <span class="caret">Data Science</span>
    <div class="nested">
        <ul>
            <li><a href="books/ds/ch1.pdf" target="_blank">Chapter 1</a></li>
            <li><a href="books/ds/ch2.pdf" target="_blank">Chapter 2</a></li>
        </ul>
    </div>
</td>
</tr>

<tr>
<td>
    <span class="caret">Machine Learning</span>
    <div class="nested">
        <ul>
            <li><a href="books/ml/ch1.pdf" target="_blank">Chapter 1</a></li>
            <li><a href="books/ml/ch2.pdf" target="_blank">Chapter 2</a></li>
        </ul>
    </div>
</td>
</tr>

</table>

<script>
    var toggler = document.getElementsByClassName("caret");

    for (var i = 0; i < toggler.length; i++) {
        toggler[i].addEventListener("click", function () {
            this.parentElement.querySelector(".nested").classList.toggle("active");
            this.classList.toggle("caret-down");
        });
    }
</script>

</body>
</html>
